services:
  nginx:
    image: nginx
    restart: unless-stopped
    env_file: .env
    logging:
      driver: "local"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - /etc/localtime:/etc/localtime:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      # Script to autoreload Nginx when certs are renewed
      - ./nginx/99-autoreload.sh:/docker-entrypoint.d/99-autoreload.sh
      - ./primarycolorsman/:/var/www/primarycolorsman
      - ./swgoh-utils:/var/www/swgoh-utils
      - ./utils:/var/www/utils
    depends_on:
      - biblereadings
      - swgoh-api
    networks:
      - my-network
  biblereadings:
    image: ghcr.io/andyschott/biblereadings2:7924325c75063c64092e46ee5523b038cb422b3a
    logging:
      driver: "local"
    ports:
      - "8080"
    env_file:
      - ./biblereadings/environment.txt
    volumes:
      - ./biblereadings/data/:/home/app/
    networks:
      - my-network
  swgoh-api:
    image: ghcr.io/andyschott/swgoh-utils:6b75ddc39611818072ad34f4a914cf3b18c95c46
    logging:
      driver: "local"
    ports:
      - "8080"
    env_file:
      - ./swgoh-api/environment.txt
    depends_on:
      - db
    networks:
      - my-network
  db:
    image: postgres:18
    restart: always
    ports:
      - 5432:5432
    env_file:
      - ./db/environment.txt
    volumes:
      - ./db/pgdata:/var/lib/postgresql/
      - ./db/migrations:/db_migrations
    networks:
      - my-network
  payoutbot:
    image: ghcr.io/andyschott/payoutbot:42261af53be9d69c0920c2c84c66c365db793929
    logging:
      driver: "local"
    env_file:
      - ./payoutbot/environment.txt
    volumes:
      - ./payoutbot/data:/home/app/
  certbot:
    image: certbot/certbot
    logging:
      driver: "local"
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./certbot/logs:/var/log/letsencrypt
    # Renew certificates every 24 hours
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 24h & wait $${!}; done;'"
networks:
  my-network:

